name: Drop stale formula revision

# Homebrew convention: a `revision` line (added to rebuild kegs for a
# formula-only change) must be removed when the version next changes. The
# release workflow's automated bump only rewrites url/sha256, so when a bump
# commit lands with a revision line still present, strip it here.

on:
  push:
    branches: [main]
    paths:
      - "Formula/*.rb"

permissions:
  contents: write

jobs:
  drop-stale-revision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Drop revision from formulae whose version just changed
        run: |
          set -euo pipefail
          changed=0
          for file in Formula/*.rb; do
            old_url=$(git show "HEAD^:$file" 2>/dev/null | grep -m1 -E '^\s*url ' || true)
            new_url=$(grep -m1 -E '^\s*url ' "$file" || true)
            if [ -z "$old_url" ] || [ "$old_url" = "$new_url" ]; then
              continue  # new formula or version unchanged
            fi
            if ! grep -qE '^\s*revision [0-9]+\s*$' "$file"; then
              continue
            fi
            # Remove the revision line and any comment lines directly above it.
            awk '
              /^[[:space:]]*#/ { buf[n++] = $0; next }
              /^[[:space:]]*revision [0-9]+[[:space:]]*$/ { n = 0; next }
              { for (i = 0; i < n; i++) print buf[i]; n = 0; print }
              END { for (i = 0; i < n; i++) print buf[i] }
            ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            echo "Dropped stale revision from $file"
            changed=1
          done
          if [ "$changed" -eq 0 ]; then
            echo "Nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Drop stale formula revision after version bump"
          git push
